<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FASCM Studio - Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Hind+Madurai:wght@400;700&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tinycolor/1.6.0/tinycolor.min.js"></script>
</head>
<body>

    <div id="login-screen" class="login-container">
        <div class="login-card">
            <div class="brand">FASCM <span>Studio</span></div>
            <h2>Welcome Back</h2>
            <div class="input-group">
                <input type="password" id="passInput" placeholder="Access Code">
                <button class="login-btn" onclick="checkAuth()">Login</button>
            </div>
            <p id="error-msg" class="error"></p>
        </div>
    </div>

    <div id="app-screen" class="app-wrapper" style="display: none;">
        <nav class="top-nav">
            <div class="brand">FASCM <span>Studio</span></div>
            <div class="nav-center">
                <button class="nav-btn" onclick="undo()">↩ Undo</button>
                <button class="nav-btn" onclick="redo()">↪ Redo</button>
            </div>
            <div class="actions">
                <button class="btn download-btn" onclick="downloadDesign()">Save to Gallery</button>
            </div>
        </nav>

        <div class="editor-main">
            <aside class="sidebar">
                <section class="panel-section">
                    <h4>Templates</h4>
                    <div class="template-grid">
                        <img src="images/1.png" onclick="setTemplate(this.src)" class="thumb">
                        <img src="images/2.png" onclick="setTemplate(this.src)" class="thumb">
                        <img src="images/3.png" onclick="setTemplate(this.src)" class="thumb">
                        <img src="images/4.png" onclick="setTemplate(this.src)" class="thumb">
                    </div>
                </section>
                <section class="panel-section">
                    <h4>Add Elements</h4>
                    <div class="tool-row">
                        <button class="tool-btn" onclick="document.getElementById('upload').click()">+ Photo</button>
                        <input type="file" id="upload" accept="image/*" hidden>
                        <button class="tool-btn" onclick="addText()">+ Text</button>
                    </div>
                </section>
            </aside>

            <main class="viewport" id="viewportArea">
                <div id="floating-toolbar" class="floating-menu" style="display: none;">
                    <select id="fontFamily" class="float-select" onchange="changeFont(this.value)">
                        <option value="Inter">Default</option>
                        <option value="Hind Madurai">Tamil</option>
                        <option value="Montserrat">Montserrat</option>
                    </select>
                    <div class="v-line"></div>
                    <div id="palette-container" class="palette-row"></div>
                    <input type="color" id="floatColor" class="float-color">
                    <button class="float-btn del" onclick="deleteObj()">🗑 Delete</button>
                </div>
                <div id="canvas-wrapper" class="canvas-wrapper">
                    <canvas id="mainCanvas"></canvas>
                </div>
            </main>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
