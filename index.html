<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>FASCM - Pro Editor</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@800&family=Playfair+Display:ital,wght@1,700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tinycolor/1.6.0/tinycolor.min.js"></script>
</head>
<body>

    <div class="app-wrapper">
        <nav class="top-nav">
            <div class="brand">FASCM <span>Pro</span></div>
            <div class="actions">
                <button class="btn share-btn" onclick="shareDesign()">Share</button>
                <button class="btn download-btn" onclick="downloadDesign()">Download</button>
            </div>
        </nav>

        <div class="editor-container">
            <aside class="left-panel">
                <section class="section">
                    <h4>Templates</h4>
                    <div class="template-grid">
                        <img src="images/1.png" onclick="setTemplate(this.src)" class="thumb">
                        <img src="images/2.png" onclick="setTemplate(this.src)" class="thumb">
                        <img src="images/3.png" onclick="setTemplate(this.src)" class="thumb">
                        <img src="images/4.png" onclick="setTemplate(this.src)" class="thumb">
                    </div>
                </section>

                <section class="section">
                    <h4>Tools</h4>
                    <div class="tool-group">
                        <button class="tool-btn" onclick="document.getElementById('upload').click()">+ Photo</button>
                        <input type="file" id="upload" accept="image/*" hidden>
                        <button class="tool-btn" onclick="addText()">+ Text</button>
                    </div>
                </section>

                <div id="objControls" class="section" style="display: none;">
                    <h4>Edit Layer</h4>
                    <label>Font Style:</label>
                    <select id="fontFamily" class="font-select" onchange="changeFont(this.value)">
                        <option value="Arial">Default (Arial)</option>
                        <option value="Roboto" style="font-family: 'Roboto';">Roboto (Clean)</option>
                        <option value="Montserrat" style="font-family: 'Montserrat';">Montserrat (Bold)</option>
                        <option value="Playfair Display" style="font-family: 'Playfair Display';">Playfair (Elegant)</option>
                        <option value="Dancing Script" style="font-family: 'Dancing Script';">Handwriting (Script)</option>
                    </select>
                    
                    <label>Color:</label>
                    <div id="palette" class="palette"></div>
                    <input type="color" id="customColor">
                    <button class="delete-btn" onclick="deleteObj()">Delete</button>
                </div>
            </aside>

            <main class="canvas-viewport">
                <div class="canvas-shadow-box" id="canvas-container">
                    <canvas id="mainCanvas"></canvas>
                </div>
            </main>
        </div>
    </div>

    <div id="cropBox" class="modal">
        <div class="modal-inner">
            <div class="crop-area"><img id="cropImg"></div>
            <div class="modal-btns">
                <button class="btn cancel-btn" onclick="document.getElementById('cropBox').style.display='none'">Cancel</button>
                <button class="btn download-btn" onclick="confirmCrop()">Apply Crop</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
