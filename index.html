<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FASCM Studio Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@800&family=Playfair+Display:ital,wght@1,700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tinycolor/1.6.0/tinycolor.min.js"></script>
</head>
<body>

    <div class="app-wrapper">
        <nav class="top-nav">
            <div class="brand">FASCM <span>Studio</span></div>
            <div class="undo-redo">
                <button class="nav-btn" onclick="undo()">↩</button>
                <button class="nav-btn" onclick="redo()">↪</button>
            </div>
            <div class="actions">
                <button class="btn share-btn" onclick="shareDesign()">Share</button>
                <button class="btn download-btn" onclick="downloadDesign()">Export</button>
            </div>
        </nav>

        <div class="editor-main">
            <aside class="sidebar">
                <section class="panel-section">
                    <h4>Templates</h4>
                    <div class="template-grid">
                        <img src="images/1.png" onclick="setTemplate(this.src)" class="thumb">
                        <img src="images/2.png" onclick="setTemplate(this.src)" class="thumb">
                        <img src="images/3.png" onclick="setTemplate(this.src)" class="thumb">
                        <img src="images/4.png" onclick="setTemplate(this.src)" class="thumb">
                    </div>
                </section>

                <section class="panel-section">
                    <h4>Add Elements</h4>
                    <div class="tool-row">
                        <button class="tool-btn" onclick="document.getElementById('upload').click()">+ Photo</button>
                        <input type="file" id="upload" accept="image/*" hidden>
                        <button class="tool-btn" onclick="addText()">+ Text</button>
                    </div>
                </section>

                <div id="objControls" class="panel-section" style="display: none;">
                    <h4>Edit Properties</h4>
                    
                    <select id="fontFamily" class="font-select" onchange="changeFont(this.value)">
                        <option value="Inter">Default</option>
                        <option value="Roboto">Roboto</option>
                        <option value="Dancing Script">Handwriting</option>
                    </select>

                    <div class="layer-btns">
                        <button class="sm-btn" onclick="bringForward()">Layer Up</button>
                        <button class="sm-btn" onclick="sendBackward()">Layer Down</button>
                    </div>

                    <div class="opacity-box">
                        <span>Opacity</span>
                        <input type="range" id="opacitySlider" min="0" max="1" step="0.1" value="1" oninput="changeOpacity(this.value)">
                    </div>

                    <div id="palette" class="palette"></div>
                    <input type="color" id="customColor" class="color-picker">
                    
                    <button class="delete-btn" onclick="deleteObj()">Remove Element</button>
                </div>
            </aside>

            <main class="viewport" id="viewportArea">
                <div id="canvas-wrapper" class="canvas-wrapper">
                    <canvas id="mainCanvas"></canvas>
                </div>
            </main>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
