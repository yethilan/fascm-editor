<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FASCM Studio PRO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🔐 LOGIN -->
<div id="loginScreen" class="login-screen">
  <div class="login-box">
    <h2>FASCM Studio</h2>
    <input type="password" id="passwordInput" placeholder="Enter Password">
    <button onclick="checkPassword()">Enter</button>
  </div>
</div>

<!-- 🚀 APP -->
<div id="app" style="display:none;">

<div class="topbar">
  <h2>FASCM Studio</h2>

  <button onclick="undo()">Undo</button>
  <button onclick="redo()">Redo</button>

  <button onclick="exportPNG()">Export</button>
</div>

<div class="main">

  <!-- LEFT PANEL -->
  <div class="left">
    <h3>Templates</h3>
    <button onclick="loadTemplate1()">Poster 1</button>
    <button onclick="loadTemplate2()">Poster 2</button>

    <h3>Tools</h3>
    <button onclick="addText()">Text</button>
    <button onclick="addRect()">Rectangle</button>
  </div>

  <!-- CANVAS -->
  <div class="canvas-area">
    <div class="canvas-box">
      <canvas id="canvas"></canvas>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right">
    <label>Color</label>
    <input type="color" onchange="changeColor(this.value)">

    <label>Opacity</label>
    <input type="range" min="0" max="1" step="0.1" onchange="changeOpacity(this.value)">

    <button onclick="deleteObj()">Delete</button>
  </div>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
