<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FASCM Studio PRO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="topbar">
  <h2>FASCM Studio</h2>

  <button onclick="undo()">Undo</button>
  <button onclick="redo()">Redo</button>

  <button onclick="exportPNG()">Export</button>
</div>

<div class="main">

  <div class="left">
    <button onclick="addText()">Text</button>
    <button onclick="addRect()">Rectangle</button>
  </div>

  <div class="canvas-area">
    <div class="canvas-box">
      <canvas id="canvas"></canvas>
    </div>
  </div>

  <div class="right">
    <label>Color</label>
    <input type="color" onchange="changeColor(this.value)">

    <label>Opacity</label>
    <input type="range" min="0" max="1" step="0.1" onchange="changeOpacity(this.value)">

    <button onclick="deleteObj()">Delete</button>
  </div>

</div>

<script src="app.js"></script>

</body>
</html>
