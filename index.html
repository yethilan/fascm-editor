<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FASCM - Pro Studio</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tinycolor/1.6.0/tinycolor.min.js"></script>
</head>
<body>

    <div class="app-wrapper">
        <nav class="top-nav">
            <div class="brand">FASCM <span>Studio</span></div>
            <div class="undo-redo-container">
                <button class="icon-btn" onclick="undo()">↩</button>
                <button class="icon-btn" onclick="redo()">↪</button>
            </div>
            <div class="actions">
                <button class="btn share-btn" onclick="shareDesign()">Share</button>
                <button class="btn download-btn" onclick="downloadDesign()">Export</button>
            </div>
        </nav>

        <div class="editor-container" style="display: flex;">
            <aside class="left-panel">
                <section class="section">
                    <h4>Collections</h4>
                    <div class="template-grid">
                        <img src="images/1.png" onclick="setTemplate(this.src)" class="thumb">
                        <img src="images/2.png" onclick="setTemplate(this.src)" class="thumb">
                        <img src="images/3.png" onclick="setTemplate(this.src)" class="thumb">
                        <img src="images/4.png" onclick="setTemplate(this.src)" class="thumb">
                    </div>
                </section>

                <section class="section">
                    <h4>Quick Tools</h4>
                    <div class="tool-group">
                        <button class="tool-btn" onclick="document.getElementById('upload').click()">Media</button>
                        <input type="file" id="upload" accept="image/*" hidden>
                        <button class="tool-btn" onclick="addText()">Text</button>
                    </div>
                </section>

                <div id="objControls" class="section" style="display: none;">
                    <h4>Properties</h4>
                    <div style="display:flex; gap:5px;">
                        <button class="sm-btn" onclick="bringForward()">↑ Forward</button>
                        <button class="sm-btn" onclick="sendBackward()">↓ Backward</button>
                    </div>
                    <div style="margin-top:15px;">
                        <span style="font-size:11px; color:#888;">OPACITY</span>
                        <input type="range" id="opacitySlider" min="0" max="1" step="0.1" value="1" oninput="changeOpacity(this.value)" style="width:100%; margin-top:5px;">
                    </div>
                    <div id="palette" class="palette" style="margin-top:20px;"></div>
                    <input type="color" id="customColor" style="width:100%; border:none; background:none; height:40px; cursor:pointer;">
                    <button class="delete-btn" onclick="deleteObj()">Remove Element</button>
                </div>
            </aside>

            <main class="canvas-viewport">
                <div class="canvas-shadow-box">
                    <canvas id="mainCanvas"></canvas>
                </div>
            </main>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
